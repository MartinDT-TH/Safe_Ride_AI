name: Test and Deploy Backend to Render

on:
  push:
    branches:
      - main_demo_project
    paths:
      - "src/SRD_Master/**"
      - ".github/workflows/deploy-render.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/SRD_Master

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SafeRide.slnx

      - name: Build
        run: dotnet build SafeRide.slnx -c Release --no-restore

      - name: Run unit tests
        run: dotnet test SafeRide.UnitTests/SafeRide.UnitTests.csproj -c Release --no-build

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Render deploy
        run: curl -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
